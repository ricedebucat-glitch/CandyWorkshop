configure(compatProjects) {
    neoForge {
        mods {
            "${mod_id}" {
                def coreMainSourceSet = rootProject.project(':core').sourceSets.main
                sourceSet(coreMainSourceSet)
                // Attach current compat classes/resources so runClient/runData can load compat implementations.
                sourceSet(sourceSets.main)
            }
        }

        runs {
            client {
                client()
                systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            }

            server {
                server()
                programArgument '--nogui'
                systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            }

            gameTestServer {
                type = 'gameTestServer'
                systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            }

            data {
                data()
                programArguments.addAll '--mod', project.mod_id, '--all', '--output',
                        file('src/generated/resources/').getAbsolutePath(), '--existing',
                        file('src/main/resources/').getAbsolutePath()
            }

            configureEach {
                systemProperty 'forge.logging.markers', 'REGISTRIES'
                logLevel = org.slf4j.event.Level.DEBUG
            }
        }
    }
}

tasks.named('jar', Jar).configure {
    // TODO build-invocation: prefer using ':jar' (or a dedicated aggregate task alias) instead of unqualified 'jar'
    // to avoid task selector resolving subproject jar tasks unexpectedly.
    notCompatibleWithConfigurationCache('Aggregates subproject jars via zipTree providers.')
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    def moduleJars = [
            project(':core').tasks.named('jar'),
            // Keep this list in sync when adding/removing compat modules.
            project(':compat-apotheosis').tasks.named('jar'),
            project(':compat-farmersdelight').tasks.named('jar'),
            project(':compat-fruitsdelight').tasks.named('jar'),
            project(':compat-jei').tasks.named('jar'),
            project(':compat-kaleidoscope').tasks.named('jar'),
            project(':compat-neapolitan').tasks.named('jar'),
            project(':compat-rei').tasks.named('jar'),
            project(':compat-youkaishomecoming').tasks.named('jar')
    ]

    dependsOn(moduleJars)
    dependsOn(tasks.named('validateCrossProjectResourceConflicts'))
    from(moduleJars.collect { jarTask -> jarTask.flatMap { it.archiveFile }.map { archive -> zipTree(archive) } })
    // Root aggregate excludes datagen implementation while subproject jars keep datagen classes for runData workflows.
    exclude 'com/lnatit/ccw/datagen/**'

    exclude 'META-INF/*.RSA', 'META-INF/*.SF', 'META-INF/*.DSA'
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

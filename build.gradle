plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.88' apply false
}

tasks.named('wrapper', Wrapper).configure {
    distributionType = Wrapper.DistributionType.BIN
}

var buildVersion = mod_version
var buildId = System.getenv('BUILD_ID')
if (buildId != null) {
    buildVersion = "${mod_version}+b${buildId}"
}

version = "v${buildVersion}-mc${minecraft_version}"
group = mod_group_id

base {
    archivesName = mod_id
}

allprojects {
    group = rootProject.group
    version = rootProject.version

    repositories {
        mavenLocal()
        maven { url = 'https://maven.blamejared.com/' }
        maven { url = 'https://maven.terraformersmc.com/' }
        maven { url = 'https://modmaven.dev' }
        maven { url = 'https://cursemaven.com' }
        maven { url = 'https://maven.shedaniel.me/' }
        maven { url = 'https://maven.ithundxr.dev/snapshots' }

        flatDir {
            dir rootProject.file('libs')
        }
    }
}

subprojects {
    apply plugin: 'java-library'
    apply plugin: 'net.neoforged.moddev'
    apply plugin: 'idea'

    java.toolchain.languageVersion = JavaLanguageVersion.of(java_version)

    sourceSets {
        generated.resources { srcDir 'src/generated/resources' }
    }

    processResources {
        from sourceSets.main.resources
        from sourceSets.generated.resources
        duplicatesStrategy = DuplicatesStrategy.EXCLUDE
        exclude '.cache'
        exclude 'assets/ccw/unused'
    }

    configurations {
        runtimeClasspath.extendsFrom localRuntime
    }

    dependencies {
        compileOnly("mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}")
        runtimeOnly("mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}")

        compileOnly("dev.emi:emi-neoforge:${emi_version}:api")
//        runtimeOnly("dev.emi:emi-neoforge:${emi_version}")
    }

    neoForge {
        version = project.neo_version

        parchment {
            mappingsVersion = project.parchment_mappings_version
            minecraftVersion = project.parchment_minecraft_version
        }

    }

    def templatesDir = file('src/main/templates')
    if (templatesDir.exists()) {
        var generateModMetadata = tasks.register('generateModMetadata', ProcessResources) {
            var replaceProperties = [
                    minecraft_version      : minecraft_version,
                    minecraft_version_range: minecraft_version_range,
                    neo_version            : neo_version,
                    neo_version_range      : neo_version_range,
                    loader_version_range   : loader_version_range,
                    mod_id                 : mod_id,
                    mod_name               : mod_name,
                    mod_license            : mod_license,
                    mod_version            : buildVersion,
                    mod_authors            : mod_authors,
                    mod_description        : mod_description
            ]
            inputs.properties replaceProperties
            expand replaceProperties
            from templatesDir
            into 'build/generated/sources/modMetadata'
        }

        sourceSets.main.resources.srcDir generateModMetadata
        neoForge.ideSyncTask generateModMetadata
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
    }

    idea {
        module {
            downloadSources = true
            downloadJavadoc = true
        }
    }
}

